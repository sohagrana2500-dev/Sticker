    <div id="root"></div>

    <script>
      /* =====================================================================
         GOOGLE SHEETS SYNC (ব্যাচ ডেটা + ইউজার একাউন্ট এখন Google Sheet-এ থাকবে)
         ---------------------------------------------------------------------
         এই স্ক্রিপ্টটি অ্যাপের মূল কোডকে স্পর্শ না করেই localStorage-এর দুইটা
         কী-কে Google Apps Script Web App-এর মাধ্যমে Google Sheet-এর দুইটা
         ট্যাবের সাথে সিঙ্ক করে:

           - "dbl_label_schedule_data_v3"  → Sheet ট্যাব "Batches"  (ব্যাচ ডেটা)
           - "blps_users_v1"               → Sheet ট্যাব "Users"    (ইউজার লগইন)

         - পেজ লোড হওয়ার সময়: Sheet থেকে সর্বশেষ ডেটা নিয়ে এসে localStorage
           আপডেট করে (কোনো পরিবর্তন থাকলে একবার রিলোড হবে)।
         - অ্যাডমিন প্যানেল থেকে ব্যাচ সেভ করলে বা নতুন ইউজার তৈরি/এডিট/ডিলিট
           করলে: সেই নতুন ডেটা স্বয়ংক্রিয়ভাবে Google Sheet-এ লেখা হয়ে যাবে।

         Web App URL পরিবর্তন করতে চাইলে শুধু নিচের SHEET_API_URL বদলান।
         ===================================================================== */
      (function () {
        var SHEET_API_URL =
          "https://script.google.com/macros/s/AKfycby0oSKLlui_7LRD0N_2JRJ0pIxt1qxv_bKOcxmw9qOTspcYDjd9YowA-cs8B3kYJQI_/exec";
        // এই কী-টা Apps Script কোডের SECRET_KEY-এর সাথে হুবহু মিলতে হবে
        var API_SECRET_KEY = "FutBHnRMQfX6_2dNok4gUcegdUL-xgO3";
        // অন্য স্ক্রিপ্ট (লগইন গেট) থেকেও একই URL/কী ব্যবহারের জন্য
        window.__SHEET_API_URL = SHEET_API_URL;
        window.__API_SECRET_KEY = API_SECRET_KEY;

        // localStorage কী → Apps Script-এর "type" প্যারামিটার (পুশ করার সময় ব্যবহৃত হয়)
        var KEY_TYPE_MAP = {
          "dbl_label_schedule_data_v3": "batches",
          "blps_users_v1": "users"
        };

        // পেজ লোড হওয়ার সাথে সাথেই শুধু ব্যাচ ডেটা টানা হবে (সবার জন্য দরকার)।
        // ইউজার লিস্ট (পাসওয়ার্ড সহ) এখন আর প্রত্যেক ভিজিটরের ব্রাউজারে
        // স্বয়ংক্রিয়ভাবে ডাউনলোড হবে না — এটা শুধু এডমিন লগইন করলেই আনা হবে।
        var PULL_ON_LOAD_KEYS = ["dbl_label_schedule_data_v3"];

        var _origSetItem = localStorage.setItem.bind(localStorage);
        var _syncTimers = {};

        // অ্যাপ যখনই ব্যাচ/ইউজার ডেটা localStorage-এ সেভ করবে, তখনই তা Sheet-এ পাঠানো হবে
        localStorage.setItem = function (key, value) {
          _origSetItem(key, value);
          var type = KEY_TYPE_MAP[key];
          if (type) {
            clearTimeout(_syncTimers[type]);
            _syncTimers[type] = setTimeout(function () {
              fetch(SHEET_API_URL + "?type=" + type + "&key=" + API_SECRET_KEY, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: value
              }).catch(function (err) {
                console.error("Google Sheet-এ সিঙ্ক ব্যর্থ হয়েছে (" + type + "):", err);
              });
            }, 400);
          }
        };

        // পেজ লোডের সময় শুধু ব্যাচ ডেটা Sheet থেকে টেনে আনা
        var pending = PULL_ON_LOAD_KEYS.length;
        var needsReload = false;

        function done() {
          pending -= 1;
          if (pending === 0 && needsReload) location.reload();
        }

        PULL_ON_LOAD_KEYS.forEach(function (key) {
          var type = KEY_TYPE_MAP[key];
          fetch(SHEET_API_URL + "?type=" + type + "&key=" + API_SECRET_KEY)
            .then(function (r) { return r.json(); })
            .then(function (sheetData) {
              if (!Array.isArray(sheetData) || sheetData.length === 0) { done(); return; }
              var newVal = JSON.stringify(sheetData);
              var oldVal = localStorage.getItem(key);
              if (newVal !== oldVal) {
                _origSetItem(key, newVal);
                needsReload = true;
              }
              done();
            })
            .catch(function (err) {
              console.error("Google Sheet থেকে ডেটা আনতে সমস্যা হয়েছে (" + type + "):", err);
              done();
            });
        });
      })();
    </script>

      /* --- Admin dashboard (user + branding management) --- */
      #admin-gate{position:fixed;inset:0;z-index:99998;display:none;background:#f1f5f9;overflow-y:auto;padding:20px 14px 60px;}
      #admin-gate.active{display:block;}
      .admin-wrap{max-width:680px;margin:0 auto;}
      .admin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
      .admin-head h2{font-size:16px;font-weight:900;color:#0f172a;}

      .btn-logout{background:#fff;border:1px solid #cbd5e1;color:#334155;font-weight:800;font-size:11.5px;padding:7px 13px;border-radius:9px;cursor:pointer;white-space:nowrap;}
      .btn-logout:hover{background:#f8fafc;}
      .admin-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
      .admin-card h3{font-size:12.5px;font-weight:900;color:#0f172a;margin-bottom:10px;}
      .admin-card .hint{font-size:10.5px;color:#94a3b8;margin-top:-6px;margin-bottom:10px;line-height:1.5;}
      .add-user-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
      .add-user-grid input[type=text],.add-user-grid input[type=password]{padding:9px 11px;border:1px solid #cbd5e1;border-radius:9px;font-size:12.5px;font-family:inherit;outline:none;width:100%;}

      .logo-pick{display:flex;align-items:center;gap:8px;}

      .add-user-row-btn{margin-top:10px;background:#2563eb;color:#fff;font-weight:800;font-size:12.5px;padding:9px 15px;border:none;border-radius:9px;cursor:pointer;width:100%;}

      .user-row{padding:12px 4px;border-top:1px solid #f1f5f9;}

      .user-row .u-name{font-weight:800;font-size:12.5px;color:#0f172a;font-family:"IBM Plex Mono",monospace;}
      .user-row .u-pass{font-size:11px;color:#64748b;font-family:"IBM Plex Mono",monospace;}

      .status-pill{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.03em;}
      .status-pill.on{background:#d1fae5;color:#047857;}
      .status-pill.off{background:#fee2e2;color:#b91c1c;}
      .u-actions{display:flex;gap:6px;}
      .u-actions button{font-size:10.5px;font-weight:800;padding:5px 9px;border-radius:7px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;color:#334155;}
      .u-actions button.danger{color:#b91c1c;border-color:#fecaca;}

      .u-brand-edit{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #e2e8f0;}

      .empty-note{font-size:11.5px;color:#94a3b8;text-align:center;padding:14px 0;}

      /* --- Branding bar shown above the app for a logged-in user (fixed, with spacer) --- */
      #user-brand-bar{position:fixed;top:0;left:0;right:0;z-index:9998;display:none;align-items:center;gap:10px;padding:9px 16px;background:#0f172a;color:#fff;min-height:44px;}
      #user-brand-bar.active{display:flex;}
      html.blps-branded #root{padding-top:44px;}
      #user-brand-bar img{height:26px;width:26px;object-fit:contain;border-radius:6px;background:#fff;}
      #user-brand-bar .brand-name{font-weight:900;font-size:13px;letter-spacing:.01em;flex:1;}
      #user-brand-bar .who{font-size:10px;font-weight:700;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:99px;}
      #user-brand-bar button{background:rgba(255,255,255,.12);border:none;color:#fff;font-weight:800;font-size:10.5px;padding:6px 11px;border-radius:8px;cursor:pointer;}
      #user-brand-bar button:hover{background:rgba(255,255,255,.2);}

      #app-logout-bar{position:fixed;top:8px;right:8px;z-index:9999;display:none;align-items:center;gap:8px;}
      #app-logout-bar.active{display:flex;}

      @media print{ #auth-gate,#admin-gate,#app-logout-bar,#user-brand-bar{display:none !important;} }
    </style>

    <!-- Single login form: same fields for everyone. The system detects whether the
         credentials belong to the main admin or to a user created by the admin. -->
    <div id="auth-gate">
      <div class="auth-card">
        <div class="auth-body">
          <div class="auth-title">লগইন করুন</div>
          <div class="auth-sub">আপনার ইউজারনেম ও পাসওয়ার্ড দিন। মূল এডমিন হলে এডমিন প্যানেল খুলবে, ইউজার হলে সরাসরি সিস্টেম খুলবে।</div>
          <div class="auth-error" id="auth-error"></div>
          <form onsubmit="return blpsLogin(event)">
            <div class="auth-field">
              <label>ইউজারনেম</label>
              <input type="text" id="login-username" autocomplete="username" required>
            </div>
            <div class="auth-field">
              <label>পাসওয়ার্ড</label>
              <input type="password" id="login-password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="auth-submit">লগইন করুন</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Admin dashboard: create / enable / disable / delete users, and set each user's
         header name + logo (their app branding). -->
    <div id="admin-gate">
      <div class="admin-wrap">
        <div class="admin-head">
          <div>
            <h2>এডমিন প্যানেল</h2>
            <p>ইউজারদের আইডি-পাসওয়ার্ড ও হেডার নেম/লোগো এখান থেকে সেট করুন।</p>
          </div>
          <button type="button" class="btn-logout" onclick="blpsLogout()">লগআউট</button>
        </div>

        <div class="admin-card">
          <h3>নতুন ইউজার যোগ করুন</h3>
          <div class="add-user-grid">
            <input type="text" id="new-username" placeholder="ইউজারনেম">
            <input type="text" id="new-password" placeholder="পাসওয়ার্ড">
            <input type="text" id="new-headername" class="full" placeholder="হেডার নেম (ঐচ্ছিক — ইউজারের অ্যাপে উপরে দেখাবে)">
            <div class="full logo-pick">
              <input type="file" id="new-logo" accept="image/*" onchange="blpsPreviewLogo(this,'new-logo-preview')">
              <img id="new-logo-preview" class="logo-preview" alt="logo preview">
            </div>
          </div>
          <button type="button" class="add-user-row-btn" onclick="blpsAddUser()">ইউজার যোগ করুন</button>
        </div>

        <div class="admin-card">
          <h3>বর্তমান ইউজার তালিকা</h3>
          <div id="user-list"></div>
        </div>
      </div>
    </div>

    <!-- Branding bar: shows the logged-in user's header name + logo above the app -->
    <div id="user-brand-bar" class="no-print">
      <img id="brand-logo" alt="logo">
      <div class="brand-name" id="brand-name"></div>
      <span class="who" id="brand-who"></span>
      <button type="button" onclick="blpsLogout()"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>লগআউট</button>
    <div id="app-logout-bar" class="no-print">
      <span class="who" id="app-logout-who" style="background:#0f172a;color:#fff;font-size:10px;font-weight:800;padding:5px 10px;border-radius:99px;opacity:.85;"></span>
      <button type="button" class="btn-logout" onclick="blpsLogout()"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>লগআউট</button>
    <script>
      (function () {
        // "admin" এখন শুধু একটা সংরক্ষিত ইউজারনেম — আসল পাসওয়ার্ড যাচাই এখন
        // আর এখানে হয় না, বরং Google Apps Script-এ (সার্ভার সাইডে) হয়, যাতে
        // এই HTML ফাইলে কোথাও এডমিনের পাসওয়ার্ড লেখা না থাকে।
        var ADMIN_USER = "admin";
        var USERS_KEY = "blps_users_v1";
        var SESSION_KEY = "blps_session_v1";
        var API_URL = window.__SHEET_API_URL;
        var API_KEY = window.__API_SECRET_KEY;

        document.documentElement.classList.add("blps-locked");

        function getUsers() {
          try {
            var raw = localStorage.getItem(USERS_KEY);
            return raw ? JSON.parse(raw) : [];
          } catch (e) {
            return [];
          }
        }
        function saveUsers(list) {
          localStorage.setItem(USERS_KEY, JSON.stringify(list));
        }
        function getSession() {
          try {
            var raw = localStorage.getItem(SESSION_KEY);
            return raw ? JSON.parse(raw) : null;
          } catch (e) {
            return null;
          }
        }
        function setSession(session) {
          localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        }
        function clearSession() {
          localStorage.removeItem(SESSION_KEY);
        }

        function showError(msg) {
          var el = document.getElementById("auth-error");
          el.textContent = msg;
          el.classList.add("show");
        }
        function clearError() {
          var el = document.getElementById("auth-error");
          el.classList.remove("show");
          el.textContent = "";
        }
        function esc(s) {
          return String(s).replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
          });
        }

        // ---- Single login: verified on the server (Apps Script), not in the browser ----
        window.blpsLogin = function (evt) {
          evt.preventDefault();
          clearError();
          var u = document.getElementById("login-username").value.trim();
          var p = document.getElementById("login-password").value;
          var btn = evt.target.querySelector(".auth-submit");
          var originalBtnText = btn ? btn.textContent : "";
          if (btn) { btn.disabled = true; btn.textContent = "যাচাই করা হচ্ছে..."; }

          fetch(API_URL + "?type=login&key=" + API_KEY, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ username: u, password: p })
          })
            .then(function (r) { return r.json(); })
            .then(function (res) {
              if (!res || !res.ok) {
                if (res && res.reason === "inactive") {
                  showError("এই ইউজার অ্যাকাউন্টটি বর্তমানে বন্ধ আছে। এডমিনের সাথে যোগাযোগ করুন।");
                } else {
                  showError("ভুল ইউজারনেম বা পাসওয়ার্ড।");
                }
                return;
              }
              if (res.role === "admin") {
                setSession({ role: "admin", username: res.username });
                enterAdmin();
              } else {
                var record = {
                  username: res.username,
                  active: true,
                  headerName: res.headerName || "",
                  logo: res.logo || ""
                };
                setSession({ role: "user", username: res.username, headerName: record.headerName, logo: record.logo });
                enterApp(record);
              }
            })
            .catch(function (err) {
              console.error("লগইন যাচাই ব্যর্থ:", err);
              showError("সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না। ইন্টারনেট সংযোগ পরীক্ষা করে আবার চেষ্টা করুন।");
            })
            .finally(function () {
              if (btn) { btn.disabled = false; btn.textContent = originalBtnText; }
            });
          return false;
        };

        // ---- Logo file -> base64 preview helper (used both for add-user and edit) ----
        window.blpsPreviewLogo = function (input, previewId, callback) {
          var file = input.files && input.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function (e) {
            var dataUrl = e.target.result;
            var img = document.getElementById(previewId);
            if (img) {
              img.src = dataUrl;
              img.classList.add("show");
            }
            input.dataset.value = dataUrl;
            if (callback) callback(dataUrl);
          };
          reader.readAsDataURL(file);
        };

        window.blpsAddUser = function () {
          var uEl = document.getElementById("new-username");
          var pEl = document.getElementById("new-password");
          var hEl = document.getElementById("new-headername");
          var lEl = document.getElementById("new-logo");
          var u = uEl.value.trim();
          var p = pEl.value.trim();
          var h = hEl.value.trim();
          var logo = lEl.dataset.value || "";

          if (!u || !p) {
            alert("ইউজারনেম ও পাসওয়ার্ড দুটোই দিন।");
            return;
          }
          if (u === ADMIN_USER) {
            alert('"admin" নামে ইউজার তৈরি করা যাবে না।');
            return;
          }
          var users = getUsers();
          for (var i = 0; i < users.length; i++) {
            if (users[i].username.toLowerCase() === u.toLowerCase()) {
              alert("এই ইউজারনেমটি আগে থেকেই আছে।");
              return;
            }
          }
          users.push({ username: u, password: p, active: true, headerName: h, logo: logo });
          saveUsers(users);
          uEl.value = "";
          pEl.value = "";
          hEl.value = "";
          lEl.value = "";
          lEl.dataset.value = "";
          var prev = document.getElementById("new-logo-preview");
          prev.classList.remove("show");
          prev.src = "";
          renderUserList();
        };

        window.blpsToggleUser = function (username) {
          var users = getUsers();
          for (var i = 0; i < users.length; i++) {
            if (users[i].username === username) {
              users[i].active = users[i].active === false ? true : false;
              break;
            }
          }
          saveUsers(users);
          renderUserList();
        };

        window.blpsDeleteUser = function (username) {
          if (!confirm('"' + username + '" ইউজারটি মুছে ফেলতে চান?')) return;
          var users = getUsers().filter(function (x) {
            return x.username !== username;
          });
          saveUsers(users);
          renderUserList();
        };

        window.blpsToggleBrandEdit = function (username) {
          var el = document.getElementById("brand-edit-" + cssSafe(username));
          if (el) el.classList.toggle("open");
        };

        window.blpsSaveBranding = function (username) {
          var safe = cssSafe(username);
          var hEl = document.getElementById("edit-headername-" + safe);
          var lEl = document.getElementById("edit-logo-" + safe);
          var users = getUsers();
          for (var i = 0; i < users.length; i++) {
            if (users[i].username === username) {
              users[i].headerName = hEl.value.trim();
              if (lEl.dataset.value) users[i].logo = lEl.dataset.value;
              break;
            }
          }
          saveUsers(users);
          alert("ব্র্যান্ডিং সংরক্ষণ করা হয়েছে।");
          renderUserList();

          // If this user is currently logged in, refresh their live header immediately.
          var session = getSession();
          if (session && session.role === "user" && session.username === username) {
            var refreshed = getUsers().filter(function (x) { return x.username === username; })[0];
            if (refreshed) applyBrandBar(refreshed);
          }
        };

        window.blpsRemoveLogo = function (username) {
          var users = getUsers();
          for (var i = 0; i < users.length; i++) {
            if (users[i].username === username) {
              users[i].logo = "";
              break;
            }
          }
          saveUsers(users);
          renderUserList();
        };

        function cssSafe(s) {
          return String(s).replace(/[^a-zA-Z0-9_-]/g, "_");
        }

        function renderUserList() {
          var users = getUsers();
          var wrap = document.getElementById("user-list");
          if (!users.length) {
            wrap.innerHTML = '<div class="empty-note">এখনো কোনো ইউজার তৈরি করা হয়নি।</div>';
            return;
          }
          var html = "";
          users.forEach(function (usr) {
            var active = usr.active !== false;
            var safe = cssSafe(usr.username);
            var logoImg = usr.logo
              ? '<img src="' + usr.logo + '" style="width:22px;height:22px;object-fit:contain;border-radius:5px;border:1px solid #e2e8f0;">'
              : "";
            html +=
              '<div class="user-row">' +
              '<div class="user-row-top">' +
              logoImg +
              '<div class="u-meta"><div class="u-name">' + esc(usr.username) + "</div>" +
              '<div class="u-pass">পাসওয়ার্ড: ' + esc(usr.password) + (usr.headerName ? " · হেডার: " + esc(usr.headerName) : "") + "</div></div>" +
              '<span class="status-pill ' + (active ? "on" : "off") + '">' + (active ? "চালু" : "বন্ধ") + "</span>" +
              '<div class="u-actions">' +
              '<button type="button" onclick="blpsToggleBrandEdit(\'' + safe + "')\">হেডার/লোগো</button>" +
              '<button type="button" onclick="blpsToggleUser(\'' + esc(usr.username).replace(/'/g, "\\'") + "')\">" + (active ? "বন্ধ করুন" : "চালু করুন") + "</button>" +
              '<button type="button" class="danger" onclick="blpsDeleteUser(\'' + esc(usr.username).replace(/'/g, "\\'") + "')\">মুছুন</button>" +
              "</div></div>" +
              '<div class="u-brand-edit" id="brand-edit-' + safe + '">' +
              '<div class="add-user-grid">' +
              '<input type="text" class="full" id="edit-headername-' + safe + '" placeholder="হেডার নেম" value="' + esc(usr.headerName || "") + '">' +
              '<div class="full logo-pick">' +
              '<input type="file" id="edit-logo-' + safe + '" accept="image/*" onchange="blpsPreviewLogo(this,\'edit-logo-preview-' + safe + "')\">" +
              '<img id="edit-logo-preview-' + safe + '" class="logo-preview' + (usr.logo ? " show" : "") + '" src="' + (usr.logo || "") + '" alt="logo preview">' +
              "</div></div>" +
              '<div style="display:flex;gap:8px;margin-top:8px;">' +
              '<button type="button" class="add-user-row-btn" style="margin-top:0;" onclick="blpsSaveBranding(\'' + esc(usr.username).replace(/'/g, "\\'") + "')\">সেভ করুন</button>" +
              (usr.logo ? '<button type="button" class="btn-logout" onclick="blpsRemoveLogo(\'' + esc(usr.username).replace(/'/g, "\\'") + "')\">লোগো মুছুন</button>" : "") +
              "</div></div></div>";
          });
          wrap.innerHTML = html;
        }

        function applyBrandBar(userRecord) {
          var bar = document.getElementById("user-brand-bar");
          var plainBar = document.getElementById("app-logout-bar");
          var hasBrand = !!(userRecord.headerName || userRecord.logo);
          if (hasBrand) {
            document.getElementById("brand-name").textContent = userRecord.headerName || "";
            var img = document.getElementById("brand-logo");
            if (userRecord.logo) {
              img.src = userRecord.logo;
              img.style.display = "";
            } else {
              img.style.display = "none";
            }
            document.getElementById("brand-who").textContent = userRecord.username;
            bar.classList.add("active");
            plainBar.classList.remove("active");
            document.documentElement.classList.add("blps-branded");
          } else {
            bar.classList.remove("active");
            document.getElementById("app-logout-who").textContent = userRecord.username;
            plainBar.classList.add("active");
            document.documentElement.classList.remove("blps-branded");
          }
        }

        function enterAdmin() {
          document.getElementById("auth-gate").classList.add("blps-hidden");
          document.getElementById("admin-gate").classList.add("active");
          document.getElementById("app-logout-bar").classList.remove("active");
          document.getElementById("user-brand-bar").classList.remove("active");
          document.documentElement.classList.remove("blps-branded");
          document.documentElement.classList.add("blps-locked");
          renderUserList();
          // এডমিন প্যানেল খোলার সাথে সাথেই Sheet থেকে সর্বশেষ ইউজার লিস্ট টেনে আনা
          fetch(API_URL + "?type=users&key=" + API_KEY)
            .then(function (r) { return r.json(); })
            .then(function (list) {
              if (Array.isArray(list)) {
                saveUsers(list);
                renderUserList();
              }
            })
            .catch(function (err) {
              console.error("Users লিস্ট আনতে সমস্যা:", err);
            });
        }

        function enterApp(userRecord) {
          document.getElementById("auth-gate").classList.add("blps-hidden");
          document.getElementById("admin-gate").classList.remove("active");
          document.documentElement.classList.remove("blps-locked");
          applyBrandBar(userRecord);
        }

        function showLogin() {
          document.getElementById("admin-gate").classList.remove("active");
          document.getElementById("app-logout-bar").classList.remove("active");
          document.getElementById("user-brand-bar").classList.remove("active");
          document.documentElement.classList.remove("blps-branded");
          document.documentElement.classList.add("blps-locked");
          document.getElementById("auth-gate").classList.remove("blps-hidden");
          clearError();
          var uEl = document.getElementById("login-username");
          var pEl = document.getElementById("login-password");
          if (uEl) uEl.value = "";
          if (pEl) pEl.value = "";
        }

        window.blpsLogout = function () {
          clearSession();
          showLogin();
        };

        // Resume session on load / reload.
        var session = getSession();
        if (session && session.role === "admin") {
          enterAdmin();
        } else if (session && session.role === "user") {
          // পুরো ইউজার লিস্ট (পাসওয়ার্ড সহ) ডাউনলোড না করে, শুধু এই একজন
          // ইউজার এখনো "চালু" আছে কিনা তা সার্ভারে জিজ্ঞেস করা হচ্ছে।
          fetch(API_URL + "?type=checkuser&username=" + encodeURIComponent(session.username) + "&key=" + API_KEY)
            .then(function (r) { return r.json(); })
            .then(function (res) {
              if (res && res.active) {
                enterApp({
                  username: session.username,
                  headerName: res.headerName || "",
                  logo: res.logo || ""
                });
              } else {
                clearSession();
                showLogin();
              }
            })
            .catch(function () {
              // ইন্টারনেট সমস্যা হলে আগের সেশন তথ্য দিয়েই সাময়িকভাবে ঢুকতে দেওয়া হচ্ছে
              enterApp({
                username: session.username,
                headerName: session.headerName || "",
                logo: session.logo || ""
              });
            });
        } else {
          showLogin();
        }
      })();
